<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BizAI — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --card: #111111;
      --border: #1f1f1f;
      --lime: #c8f135;
      --lime-dark: #a8d120;
      --text: #ffffff;
      --muted: #666666;
      --input-bg: #161616;
      --error: #ff4d4d;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background glow */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(200,241,53,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 440px;
      padding: 24px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--lime);
      letter-spacing: -1px;
      text-align: center;
      margin-bottom: 32px;
      display: block;
      text-decoration: none;
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 32px;
      border: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 9px;
      transition: all 0.2s;
      color: var(--muted);
      user-select: none;
    }

    .tab.active {
      background: var(--lime);
      color: #000;
    }

    /* Form heading */
    .form-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .form-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* Input */
    .input-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #aaa;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 15px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--lime);
    }

    input::placeholder { color: #333; }

    /* Error */
    .error-msg {
      font-size: 13px;
      color: var(--error);
      margin-top: 6px;
      display: none;
    }

    /* Submit button */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--lime);
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
      position: relative;
    }

    .btn-primary:hover { background: var(--lime-dark); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Google button */
    .btn-google {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-google:hover {
      border-color: #444;
      background: #161616;
    }

    .btn-google svg { width: 18px; height: 18px; }

    /* Footer text */
    .footer-text {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: 24px;
    }

    .footer-text a {
      color: var(--lime);
      text-decoration: none;
      font-weight: 600;
    }

    /* Success state */
    .success-card {
      text-align: center;
      padding: 20px 0;
      display: none;
    }

    .success-icon {
      width: 60px;
      height: 60px;
      background: var(--lime);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
    }

    .success-card h2 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .success-card p {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 24px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 14px;
      color: var(--text);
      z-index: 999;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: var(--error); color: var(--error); }
    .toast.success { border-color: var(--lime); color: var(--lime); }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #000;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Form panels */
    .form-panel { display: none; }
    .form-panel.active { display: block; }
  </style>
</head>
<body>

<div class="container">
  <a href="index.html" class="logo">BizAI</a>

  <div class="card">
    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Sign In</div>
      <div class="tab" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <!-- LOGIN FORM -->
    <div class="form-panel active" id="login-panel">
      <div class="form-title">Welcome back 👋</div>
      <div class="form-subtitle">Sign in to your BizAI account</div>

      <div class="input-group">
        <label>Email address</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
        <div class="error-msg" id="login-error">Invalid email or password.</div>
      </div>

      <button class="btn-primary" onclick="handleLogin()" id="login-btn">Sign In</button>

      <div class="divider">or</div>

      <button class="btn-google" onclick="handleGoogle()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <!-- SIGNUP FORM -->
    <div class="form-panel" id="signup-panel">
      <div class="form-title">Create account 🚀</div>
      <div class="form-subtitle">Start for free — no credit card needed</div>

      <div class="input-group">
        <label>Full name</label>
        <input type="text" id="signup-name" placeholder="Sandeep Gorrela" />
      </div>

      <div class="input-group">
        <label>Email address</label>
        <input type="email" id="signup-email" placeholder="you@example.com" />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Min. 6 characters" />
        <div class="error-msg" id="signup-error">Please check your details.</div>
      </div>

      <button class="btn-primary" onclick="handleSignup()" id="signup-btn">Create Free Account</button>

      <div class="divider">or</div>

      <button class="btn-google" onclick="handleGoogle()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <!-- SUCCESS STATE -->
    <div class="success-card" id="success-card">
      <div class="success-icon">✓</div>
      <h2>You're in! 🎉</h2>
      <p>Welcome to BizAI. Redirecting to your dashboard...</p>
      <button class="btn-primary" onclick="window.location.href='ai-business-tool.jsx'">Go to Dashboard →</button>
    </div>

  </div>

  <div class="footer-text" id="footer-text">
    Don't have an account? <a href="#" onclick="switchTab('signup')">Sign up free</a>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    signInWithPopup,
    GoogleAuthProvider,
    updateProfile
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // Your Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyBBgNeFE9SeBM3e9aa5IhimqWyXRDsWf8w",
    authDomain: "bizai-tool-8ee37.firebaseapp.com",
    projectId: "bizai-tool-8ee37",
    storageBucket: "bizai-tool-8ee37.firebasestorage.app",
    messagingSenderId: "754956099971",
    appId: "1:754956099971:web:fead9835d3927c825c96b6",
    measurementId: "G-YHBCPELWN5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3000);
  }

  function showSuccess() {
    document.getElementById('login-panel').style.display = 'none';
    document.getElementById('signup-panel').style.display = 'none';
    document.getElementById('success-card').style.display = 'block';
    document.getElementById('footer-text').style.display = 'none';
    document.querySelector('.tabs').style.display = 'none';
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (loading) {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Please wait...';
    } else {
      btn.disabled = false;
      btn.innerHTML = btnId === 'login-btn' ? 'Sign In' : 'Create Free Account';
    }
  }

  window.handleLogin = async function() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';

    if (!email || !password) {
      showToast('Please fill in all fields', 'error');
      return;
    }

    setLoading('login-btn', true);
    try {
      await signInWithEmailAndPassword(auth, email, password);
      showToast('Welcome back! 👋', 'success');
      setTimeout(showSuccess, 800);
    } catch (e) {
      errEl.style.display = 'block';
      errEl.textContent = 'Invalid email or password. Please try again.';
      setLoading('login-btn', false);
    }
  };

  window.handleSignup = async function() {
    const name = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const errEl = document.getElementById('signup-error');
    errEl.style.display = 'none';

    if (!name || !email || !password) {
      showToast('Please fill in all fields', 'error');
      return;
    }
    if (password.length < 6) {
      errEl.style.display = 'block';
      errEl.textContent = 'Password must be at least 6 characters.';
      return;
    }

    setLoading('signup-btn', true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
      showToast('Account created! 🎉', 'success');
      setTimeout(showSuccess, 800);
    } catch (e) {
      errEl.style.display = 'block';
      if (e.code === 'auth/email-already-in-use') {
        errEl.textContent = 'Email already in use. Try signing in.';
      } else {
        errEl.textContent = 'Something went wrong. Please try again.';
      }
      setLoading('signup-btn', false);
    }
  };

  window.handleGoogle = async function() {
    try {
      await signInWithPopup(auth, provider);
      showToast('Signed in with Google! 🎉', 'success');
      setTimeout(showSuccess, 800);
    } catch (e) {
      showToast('Google sign-in failed. Try again.', 'error');
    }
  };

  window.switchTab = function(tab) {
    const tabs = document.querySelectorAll('.tab');
    tabs[0].classList.toggle('active', tab === 'login');
    tabs[1].classList.toggle('active', tab === 'signup');

    document.getElementById('login-panel').classList.toggle('active', tab === 'login');
    document.getElementById('signup-panel').classList.toggle('active', tab === 'signup');

    const footer = document.getElementById('footer-text');
    footer.innerHTML = tab === 'login'
      ? 'Don\'t have an account? <a href="#" onclick="switchTab(\'signup\')">Sign up free</a>'
      : 'Already have an account? <a href="#" onclick="switchTab(\'login\')">Sign in</a>';
  };

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const loginActive = document.getElementById('login-panel').classList.contains('active');
      if (loginActive) window.handleLogin();
      else window.handleSignup();
    }
  });
</script>

</body>
</html>
